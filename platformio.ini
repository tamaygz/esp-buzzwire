; ── ESP Buzzwire — PlatformIO Build Configuration ───────────────────────────
; Flash with:   pio run -e d1_mini -t upload
; Monitor:      pio device monitor

; ── Shared settings ─────────────────────────────────────────────────────────
[env]
platform = espressif8266
framework = arduino
lib_deps =
    fastled/FastLED @ ^3.6.0
    https://github.com/me-no-dev/ESPAsyncWebServer.git#ad3741d159f9cfd50c567e81b67f3bef1dc6d89f
    https://github.com/me-no-dev/ESPAsyncTCP.git#191bdeb2555bf86e213ecb816227d125753b608e
    bblanchon/ArduinoJson @ ^7.0.0
    tzapu/WiFiManager @ ^2.0.17
monitor_speed = 115200
upload_speed  = 921600
build_flags   = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ── Wemos D1 Mini ────────────────────────────────────────────────────────────
[env:d1_mini]
board = d1_mini
board_build.filesystem = littlefs

; ── NodeMCU v2 ───────────────────────────────────────────────────────────────
[env:nodemcuv2]
board = nodemcuv2
board_build.filesystem = littlefs

; ── Debug build (verbose logging, DEBUG_LOGGING=1) ───────────────────────────
[env:d1_mini_debug]
board = d1_mini
board_build.filesystem = littlefs
build_flags =
    ${env.build_flags}
    -D DEBUG_LOGGING=1
