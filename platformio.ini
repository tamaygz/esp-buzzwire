; ── ESP Buzzwire — PlatformIO Build Configuration ───────────────────────────
; Flash with:   pio run -e d1_mini -t upload
; Monitor:      pio device monitor

; ── Shared settings ─────────────────────────────────────────────────────────
[env]
platform = espressif8266
framework = arduino
lib_deps =
    fastled/FastLED @ ^3.6.0
monitor_speed = 115200
upload_speed  = 921600
build_flags   = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ── Wemos D1 Mini ────────────────────────────────────────────────────────────
[env:d1_mini]
board = d1_mini

; ── NodeMCU v2 ───────────────────────────────────────────────────────────────
[env:nodemcuv2]
board = nodemcuv2

; ── Debug build (verbose logging, DEBUG_LOGGING=1) ───────────────────────────
[env:d1_mini_debug]
board = d1_mini
build_flags =
    ${env.build_flags}
    -D DEBUG_LOGGING=1
