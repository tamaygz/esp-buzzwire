[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
lib_deps =
    fastled/FastLED @ ^3.6.0
monitor_speed = 115200
build_flags = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    fastled/FastLED @ ^3.6.0
monitor_speed = 115200
